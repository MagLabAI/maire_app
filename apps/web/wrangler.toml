name = "maire-app"
compatibility_date = "2024-01-01"
compatibility_flags = ["nodejs_compat"]
pages_build_output_dir = ".svelte-kit/cloudflare"

# ============================================
# D1 Database: Research queue and city metadata
# ============================================
[[d1_databases]]
binding = "DB"
database_name = "maire-research-queue"
database_id = "28d1d627-c234-4e1f-87e6-6e8a118def75"

# ============================================
# KV Namespace: City research data storage
# ============================================
[[kv_namespaces]]
binding = "CITY_DATA"
id = "4c475af63f75458f8309fc35d55259ad"

# ============================================
# Scheduled Workers: Nightly research processing
# ============================================
# Cron triggers are handled by a separate Worker: workers/scheduler/
# Deploy: cd workers/scheduler && npm run deploy
# Schedule: 0 2-6 * * * (every hour 2-6am UTC)
# Manual trigger: GET /api/_scheduled/process-queue
