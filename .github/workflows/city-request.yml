name: City Request Research

on:
  issues:
    types: [opened, labeled]

jobs:
  research:
    if: contains(github.event.issue.labels.*.name, 'demande-ville')
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Python dependencies
        run: |
          pip install mistralai tavily-python python-dotenv aiohttp tiktoken

      - name: Install wrangler
        run: npm install -g wrangler

      - name: Run city research
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          MISTRAL_API_KEY: ${{ secrets.MISTRAL_API_KEY }}
          TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          python scripts/process_city_request.py --issue-number ${{ github.event.issue.number }}

      - name: Commit and push static files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add apps/web/static/data/ apps/web/svelte.config.js
          git diff --staged --quiet || git commit -m "feat: add city data (fixes #${{ github.event.issue.number }})"
          git pull --rebase && git push
